<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Spectrion Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Fredoka', sans-serif;
}

body {
  background: #0a0a0a;
  color: #fff;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  text-align: center;
  max-width: 600px;
  padding: 30px;
}

.logo {
  font-size: 26px;
  margin-bottom: 20px;
}

.logo span {
  font-family: 'Pacifico', cursive;
  color: #8f5cff;
}

.code {
  font-size: 80px;
  font-weight: 600;
  margin-bottom: 10px;
}

.message {
  color: #aaa;
  margin-bottom: 30px;
  line-height: 1.6;
}

.btn {
  display: inline-block;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #6cf, #8f5cff);
  color: white;
  text-decoration: none;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

.small {
  margin-top: 25px;
  font-size: 12px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    Spectrion <span>Labs</span>
  </div>

  <div class="code">404</div>

  <div class="message">
    The requested system path does not exist or has been relocated within Spectrion infrastructure.
    <br><br>
    You may have entered an invalid route or accessed a deprecated module.
  </div>

  <a class="btn" href="/">Return Home</a>

  <div class="small">
    Spectrion Labs / system error handler
  </div>

</div>

</body>
</html>
